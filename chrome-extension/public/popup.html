<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepCheck Guard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      background: #080a12;
      color: #e0e8f0;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #0d1525, #111827);
      padding: 16px;
      border-bottom: 1px solid rgba(0,255,170,0.15);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: rgba(0,255,170,0.1);
      border: 1px solid rgba(0,255,170,0.3);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .logo-text { font-size: 13px; font-weight: bold; color: #00ffaa; letter-spacing: 1px; }
    .logo-sub { font-size: 9px; color: rgba(150,170,190,0.6); letter-spacing: 0.5px; }

    .status-section {
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-label { font-size: 11px; color: rgba(150,170,190,0.8); }

    .toggle {
      width: 44px;
      height: 24px;
      background: #1a2030;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      cursor: pointer;
      position: relative;
      transition: background 0.3s;
    }

    .toggle.on { background: rgba(0,255,170,0.2); border-color: rgba(0,255,170,0.4); }

    .toggle::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      background: #444;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: all 0.3s;
    }

    .toggle.on::after { left: 22px; background: #00ffaa; }

    .stats {
      padding: 0 16px 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 10px;
    }

    .stat-value { font-size: 22px; font-weight: bold; color: #00ffaa; }
    .stat-label { font-size: 9px; color: rgba(150,170,190,0.5); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

    .footer {
      padding: 10px 16px;
      border-top: 1px solid rgba(255,255,255,0.05);
      font-size: 9px;
      color: rgba(100,120,140,0.5);
      text-align: center;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-icon">◈</div>
    <div>
      <div class="logo-text">DEEPCHECK GUARD</div>
      <div class="logo-sub">AUTONOMOUS SECURITY SHIELD</div>
    </div>
  </div>

  <div class="status-section">
    <div class="status-label" id="status-text">Shield Active</div>
    <div class="toggle on" id="toggle-btn"></div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-value" id="threats-count">0</div>
      <div class="stat-label">Threats Blocked</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="frames-count">0</div>
      <div class="stat-label">Frames Scanned</div>
    </div>
  </div>

  <div class="footer">DEEPCHECK GUARD v1.0 · HACKATHON BUILD</div>

  <script src="popup.js"></script>
</body>
</html>
